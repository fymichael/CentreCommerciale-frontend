<div class="container-xxl py-4 overflow-y-auto shadow-sm bg-light" style="height: calc(100vh - 200px); scrollbar-width: thin;">
  
  <c-row class="g-4">
    <c-col lg="4">
      <c-card class="h-100 border-0 shadow-sm text-center">
        <c-card-body class="d-flex flex-column align-items-center justify-content-center p-4">
          <h4 class="fw-bold text-dark mb-2">Tech Shop</h4>
          <c-avatar [src]="'https://via.placeholder.com/150/FF6347/FFFFFF?text=T'" size="xl" class="mb-3 border border-3 border-primary shadow-sm"></c-avatar>
          <p class="text-muted fst-italic mb-3">"L'innovation à portée de main"</p>
  
          <div class="bg-light p-3 rounded-3 w-100 border">
            <div class="text-warning mb-1">
              <svg cIcon name="cilStar" size="lg"></svg>
              <svg cIcon name="cilStar" size="lg"></svg>
              <svg cIcon name="cilStar" size="lg"></svg>
              <svg cIcon name="cilStar" size="lg"></svg>
              <svg cIcon name="cilStarHalf" size="lg"></svg>
            </div>
            <div class="h5 fw-bold mb-0">4.5 / 5</div>
            <small class="text-muted">(128 avis clients)</small>
          </div>
        </c-card-body>
      </c-card>
    </c-col>
  
    <c-col lg="8">
      <c-card class="h-100 border-0 shadow-sm">
        <c-card-header class="bg-primary text-white fw-bold p-3">
          Informations de la boutique
        </c-card-header>
        <c-card-body class="p-4">
          <form cForm class="row g-3">
            <c-col md="6">
              <label cLabel for="ownerName">Nom du propriétaire</label>
              <input cFormControl id="ownerName" type="text" value="Dupont Jean" />
            </c-col>
            <c-col md="6">
              <label cLabel for="nifStat">NIF / STAT</label>
              <input cFormControl id="nifStat" type="text" value="1234567890" />
            </c-col>
            <c-col md="6">
              <label cLabel for="contact">Contact</label>
              <input cFormControl id="contact" type="tel" value="+261 32 12 345 67" />
            </c-col>
            <c-col md="6">
              <label cLabel for="address">Adresse</label>
              <input cFormControl id="address" type="text" value="123 Avenue de la République, Antananarivo" />
            </c-col>
            <c-col xs="12">
              <label cLabel for="email">Email</label>
              <input cFormControl id="email" type="email" value="contact.tech@example.com" />
            </c-col>
            <c-col md="6">
              <label cLabel for="shopType">Type de la boutique</label>
              <select cSelect id="shopType" class="form-select border-start-0 ps-0 shadow-none">
                <option>Électronique</option>
                <option>Textile</option>
                <option>Alimentaire</option>
              </select>
            </c-col>
            <c-col md="6">
                <label cLabel>Type d'abonnement</label>
                <div class="d-flex gap-2">
                    <c-badge color="primary" class="py-2 px-3 fw-bold fs-6 flex-grow-1">Classique</c-badge>
                    <button cButton color="info" variant="outline" size="sm">
                        <svg cIcon name="cilPencil"></svg>
                    </button>
                </div>
            </c-col>
            <c-col xs="6">
                <button cButton color="success" class="text-white shadow-sm">
                  <svg cIcon name="cilSave" class="me-2"></svg> Enregistrer les modifications
                </button>
            </c-col>
            <c-col xs="6">
                <button cButton color="danger" class="text-white shadow-sm" [cModalToggle]="stopSubscriptionModal.id">
                  Arrêter l'abonnement
                </button>
            </c-col>
          </form>
        </c-card-body>
      </c-card>
    </c-col>
  </c-row>
  
  <button 
    cButton 
    color="secondary" 
    variant="outline" 
    size="sm" 
    class="mt-4 d-flex align-items-center" 
    [routerLink]="['/subscription-shop']">
    <svg cIcon name="cilArrowLeft" class="me-1"></svg> 
    Activer la boutique
  </button>

  <c-tabs [activeItemKey]="'products'" class="mt-4">
    <c-tabs-list variant="tabs">
      <button cTab itemKey="products"> <svg cIcon name="cilBasket" class="me-2"></svg> Mes Produits</button>
      <button cTab itemKey="commandes"><svg cIcon name="cilTruck" class="me-2"></svg> Mes Commandes</button>
      <button cTab itemKey="stocks"><svg cIcon name="cilStorage" class="me-2"></svg> Mes Stocks</button>
      <button cTab itemKey="dashboard"><svg cIcon name="cilSpeedometer" class="me-2"></svg> Tableau de bord personnel </button>
    </c-tabs-list>
    
    <c-tabs-content class="border border-top-0 rounded-bottom bg-white mb-4 shadow-sm">
      
      <c-tab-panel class="p-3" itemKey="products">
        <app-shop-product></app-shop-product>
      </c-tab-panel>

      <c-tab-panel class="p-3" itemKey="commandes">
        <app-shop-order></app-shop-order>
      </c-tab-panel>

      <c-tab-panel class="p-3" itemKey="stocks">
        <app-stock-managment></app-stock-managment>
      </c-tab-panel>

      <c-tab-panel class="p-3" itemKey="dashboard">
        <app-shop-dashboard></app-shop-dashboard>
      </c-tab-panel>

    </c-tabs-content>
  </c-tabs>
</div>

<!-- Modals confirming to stop subscription (Start) -->
<c-modal #stopSubscriptionModal backdrop="static" id="stopSubscriptionModal">
  <c-modal-header>
    <h5 cModalTitle>Confirmation d'arrêt d'abonnement</h5>
    <button [cModalToggle]="stopSubscriptionModal.id" cButtonClose></button>
  </c-modal-header>
  
  <c-modal-body>
    Voulez-vous arrêter l'abonnement de la boutique <strong> Tech Shop </strong> ?
  </c-modal-body>
  
  <c-modal-footer>
    <button [cModalToggle]="stopSubscriptionModal.id" cButton color="secondary">
      Annuler
    </button>
    <button cButton color="primary">
      Confirmer
    </button>
  </c-modal-footer>
</c-modal>
<!-- Modals confirming to stop subscription (End) -->
